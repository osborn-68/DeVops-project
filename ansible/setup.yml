---
- hosts: devops-master
  become: yes

  tasks:

  - name: Install Java
    apt:
      name: openjdk-11-jdk
      state: present
      update_cache: yes

  - name: Install Jenkins
    apt:
      name: jenkins
      state: present

  - name: Install Terraform
    apt:
      name: terraform
      state: present


- hosts: devops-agent
  become: yes

  tasks:

  - name: Install Docker
    apt:
      name: docker.io
      state: present

  - name: Start Docker
    service:
      name: docker
      state: started
